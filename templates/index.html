<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ABB KOB Chatbot</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    </head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <h2>ABB KOB Chatbot</h2>
        </div>
        <div class="chat-box" id="chat-box">
        </div>
        <div class="chat-input">
            <input type="text" id="user-input" placeholder="Mesajınızı yazın..." autofocus>
            <button id="send-button">Göndər</button>
        </div>
        <div class="feedback-section">
            <h3>Geribildirim Buraxın</h3>
            <textarea id="feedback-input" placeholder="Xidmətimiz haqqında geribildirim..." rows="3"></textarea>
            <button id="feedback-button">Geribildirim Göndər</button>
            <p id="feedback-status"></p>
        </div>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
